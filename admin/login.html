<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login | PAPERMONKS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&family=Geist:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; }
  body { background-color: #0B0D12; color: #e2e2e9; -webkit-font-smoothing: antialiased; }
  .glass-card { background: rgba(22,25,34,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(217,194,144,0.15); }
  .form-input { width:100%; background:rgba(255,255,255,0.04); border:none; border-bottom:1px solid rgba(76,70,59,0.4); padding:16px 8px; color:#e2e2e9; outline:none; transition:border-color 0.3s; font-family:'Inter',sans-serif; }
  .form-input:focus { border-bottom-color:#D9C290; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #d9c290; }
</style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#f6deaa", "on-primary": "#3c2f09", "surface": "#111318",
          "surface-container": "#1e1f25", "on-surface": "#e2e2e9",
          "on-surface-variant": "#cec5b7", "outline-variant": "#4c463b", "alert-red": "#ef4444"
        },
        fontFamily: { "headline-lg": ["Playfair Display"], "label-caps": ["Geist"], "body-sm": ["Inter"] },
        fontSize: {
          "headline-lg": ["32px", {lineHeight:"1.3",letterSpacing:"0.05em"}],
          "label-caps": ["12px", {lineHeight:"1.0",letterSpacing:"0.2em"}]
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="/src/site.css"/>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">
  <!-- Background -->
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_30%,rgba(217,194,144,0.06),transparent_70%)]"></div>

  <div class="w-full max-w-md mx-auto px-6 relative z-10">
    <div class="text-center mb-12">
      <a href="/index.html" class="font-headline-lg text-primary tracking-widest uppercase block mb-2">PAPERMONKS</a>
      <span class="font-label-caps text-on-surface-variant text-[10px]">ADMIN PORTAL</span>
    </div>

    <div class="glass-card rounded-2xl p-10 md:p-14">
      <h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome back</h1>
      <p class="text-on-surface-variant text-sm mb-10">Sign in to your administrator account</p>

      <div id="error-msg" class="hidden mb-6 px-4 py-3 rounded-lg bg-alert-red/10 border border-alert-red/30 text-alert-red font-label-caps text-[11px]">
        Invalid credentials. Please try again.
      </div>

      <form id="login-form" class="space-y-10">
        <div>
          <label class="block font-label-caps text-[10px] text-on-surface-variant/70 mb-3 uppercase tracking-widest">Username</label>
          <input id="username" class="form-input" type="text" placeholder="admin" autocomplete="username"/>
        </div>
        <div class="relative">
          <label class="block font-label-caps text-[10px] text-on-surface-variant/70 mb-3 uppercase tracking-widest">Password</label>
          <input id="password" class="form-input pr-12" type="password" placeholder="••••••••" autocomplete="current-password"/>
          <button type="button" id="toggle-pw" class="absolute right-2 bottom-4 text-on-surface-variant hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-[18px]">visibility</span>
          </button>
        </div>
        <button type="submit" class="w-full py-5 rounded-full border-[1.5px] border-primary text-primary font-label-caps tracking-[0.2em] hover:bg-primary/10 transition-all duration-300">
          SIGN IN
        </button>
      </form>

      <p class="text-center text-on-surface-variant text-[11px] mt-8">
        Demo credentials: <span class="text-primary">admin</span> / <span class="text-primary">papermonks</span>
      </p>
    </div>

    <div class="text-center mt-8">
      <a href="/index.html" class="font-label-caps text-on-surface-variant hover:text-primary transition-colors text-[11px]">
        ← BACK TO STORE
      </a>
    </div>
  </div>

  <script>
    // Check if already logged in
    if (sessionStorage.getItem('pm_admin')) {
      window.location.href = '/admin/index.html'
    }

    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password')
      const icon = document.querySelector('#toggle-pw .material-symbols-outlined')
      if (pw.type === 'password') {
        pw.type = 'text'
        icon.textContent = 'visibility_off'
      } else {
        pw.type = 'password'
        icon.textContent = 'visibility'
      }
    })

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault()
      const user = document.getElementById('username').value
      const pass = document.getElementById('password').value

      if (user === 'admin' && pass === 'papermonks') {
        sessionStorage.setItem('pm_admin', '1')
        window.location.href = '/admin/index.html'
      } else {
        document.getElementById('error-msg').classList.remove('hidden')
        document.getElementById('password').value = ''
        document.getElementById('password').focus()
      }
    })
  </script>
<script type="module" src="/src/site.js"></script>
</body>
</html>
