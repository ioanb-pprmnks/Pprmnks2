<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Product | PAPERMONKS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&family=Geist:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; }
  body { background-color: #0B0D12; color: #e2e2e9; -webkit-font-smoothing: antialiased; }
  .glass-card { background: rgba(22,25,34,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(217,194,144,0.1); }
  .magnetic-button { transition: transform 0.3s cubic-bezier(0.23,1,0.32,1), border-color 0.3s ease; }
  .magnetic-button:hover { border-color: #f6deaa; background: rgba(217,194,144,0.05); }
  .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
  .accordion-item.active .accordion-content { max-height: 200px; }
  .accordion-item.active .icon-rotate { transform: rotate(45deg); }
  #main-image { transition: opacity 0.3s ease; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0c0e13; }
  ::-webkit-scrollbar-thumb { background: #d9c290; }
</style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#f6deaa", "primary-container": "#d9c290", "on-primary": "#3c2f09",
          "surface": "#111318", "surface-container": "#1e1f25", "surface-container-low": "#1a1b21",
          "surface-container-lowest": "#0c0e13", "on-surface": "#e2e2e9",
          "on-surface-variant": "#cec5b7", "outline-variant": "#4c463b", "ink-black": "#11141B",
          "background": "#111318"
        },
        spacing: {
          "section-gap": "160px", "edge-margin-desktop": "80px",
          "container-max": "1440px", "element-gap": "24px"
        },
        fontFamily: {
          "headline-lg": ["Playfair Display"], "display-lg": ["Playfair Display"],
          "body-sm": ["Inter"], "label-caps": ["Geist"], "nav-link": ["Geist"],
          "headline-xl": ["Playfair Display"], "body-md": ["Inter"]
        },
        fontSize: {
          "headline-lg": ["32px", {lineHeight:"1.3",letterSpacing:"0.05em",fontWeight:"400"}],
          "headline-xl": ["48px", {lineHeight:"1.2",letterSpacing:"0.05em",fontWeight:"400"}],
          "label-caps": ["12px", {lineHeight:"1.0",letterSpacing:"0.2em",fontWeight:"500"}],
          "nav-link": ["13px", {lineHeight:"1.0",letterSpacing:"0.15em",fontWeight:"400"}],
          "body-md": ["16px", {lineHeight:"1.6",letterSpacing:"0.01em",fontWeight:"400"}],
          "body-sm": ["14px", {lineHeight:"1.6",letterSpacing:"0.01em",fontWeight:"400"}]
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="/src/site.css"/>
</head>
<body class="bg-background selection:bg-primary/20 overflow-x-hidden">

<!-- Navigation -->
<nav class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-primary/10 shadow-sm transition-all duration-500">
  <div class="flex justify-between items-center px-edge-margin-desktop h-20 w-full max-w-container-max mx-auto">
    <div class="flex items-center gap-12">
      <a href="/index.html" class="font-headline-lg text-primary tracking-widest uppercase"><img src="/logo.png" alt="PAPERMONKS" class="h-7" style="filter: invert(87%) sepia(25%) saturate(700%) hue-rotate(3deg) brightness(107%);"/></a>
      <div class="hidden md:flex gap-8">
        <a href="/shop.html" class="font-nav-link text-nav-link text-primary border-b-2 border-primary pb-1">SHOP</a>
        <a href="/story.html" class="font-nav-link text-nav-link text-on-surface-variant hover:text-primary transition-colors duration-300">STORY</a>
        <a href="/artists.html" class="font-nav-link text-nav-link text-on-surface-variant hover:text-primary transition-colors duration-300">ARTISTS</a>
        <a href="/contact.html" class="font-nav-link text-nav-link text-on-surface-variant hover:text-primary transition-colors duration-300">CONTACT</a>
      </div>
    </div>
    <div class="flex items-center gap-6">
      <a href="/cart.html" class="hover:opacity-80 transition-opacity relative">
        <span class="material-symbols-outlined text-primary">shopping_bag</span>
        <span class="cart-count hidden absolute -top-1 -right-1 bg-primary text-on-primary text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
      </a>
    </div>
  </div>
</nav>

<main class="pt-32 pb-section-gap max-w-container-max mx-auto px-edge-margin-desktop" id="product-main">
  <!-- Loading state -->
  <div id="loading" class="flex items-center justify-center min-h-[60vh]">
    <span class="font-label-caps text-on-surface-variant">LOADING...</span>
  </div>

  <!-- Product Content (hidden until loaded) -->
  <div id="product-content" class="hidden">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-16 items-start">
      <!-- Left: Image Carousel -->
      <div class="lg:col-span-7 flex flex-col gap-6">
        <div class="relative group aspect-[4/5] overflow-hidden bg-surface-container-low">
          <img id="main-image" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" src="" alt="Product"/>
          <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300" id="dot-nav"></div>
        </div>
        <div class="grid grid-cols-4 gap-4" id="thumbnails"></div>
      </div>

      <!-- Right: Details -->
      <div class="lg:col-span-5 flex flex-col gap-10 lg:sticky lg:top-32">
        <div>
          <div class="flex items-center gap-2 mb-4">
            <span id="product-edition" class="font-label-caps text-on-surface-variant tracking-[0.3em]">LIMITED EDITION</span>
            <div class="h-[1px] w-8 bg-primary/30"></div>
          </div>
          <h1 id="product-name" class="font-headline-xl text-headline-xl text-on-surface mb-2">—</h1>
          <div class="flex items-center gap-4">
            <p id="product-price" class="font-body-md text-primary">—</p>
            <div class="w-[1px] h-4 bg-outline-variant/30"></div>
            <a id="product-artist-link" href="/artists.html" class="font-label-caps text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2">
              <span id="product-artist">—</span>
              <span class="material-symbols-outlined text-xs">arrow_outward</span>
            </a>
          </div>
        </div>

        <p id="product-description" class="font-body-md text-body-md text-on-surface-variant leading-relaxed">—</p>

        <!-- Stock indicator -->
        <div id="stock-indicator" class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-green-500"></div>
          <span id="stock-text" class="font-label-caps text-on-surface-variant text-[11px]">IN STOCK</span>
        </div>

        <!-- Actions -->
        <div class="flex flex-col gap-6">
          <div class="flex items-center gap-8">
            <div class="flex items-center border border-primary/20 rounded-full px-4 py-2 gap-6">
              <button class="text-primary hover:opacity-50" onclick="updateQty(-1)">
                <span class="material-symbols-outlined text-sm">remove</span>
              </button>
              <span class="font-label-caps min-w-[12px] text-center" id="qty">1</span>
              <button class="text-primary hover:opacity-50" onclick="updateQty(1)">
                <span class="material-symbols-outlined text-sm">add</span>
              </button>
            </div>
          </div>
          <button id="add-to-cart-btn" class="magnetic-button w-full h-16 rounded-full border border-primary text-primary font-label-caps tracking-widest hover:bg-primary hover:text-on-primary transition-all duration-500 uppercase flex items-center justify-center gap-3">
            ADD TO CART
            <span class="material-symbols-outlined">shopping_cart</span>
          </button>
        </div>

        <!-- Accordion -->
        <div class="flex flex-col border-t border-outline-variant/10" id="accordion">
          <div class="accordion-item border-b border-outline-variant/10 py-6">
            <button class="w-full flex justify-between items-center text-left" onclick="toggleAccordion(this)">
              <span class="font-label-caps text-on-surface tracking-widest">MATERIALS</span>
              <span class="material-symbols-outlined icon-rotate transition-transform text-primary">add</span>
            </button>
            <div class="accordion-content">
              <div class="pt-4 font-body-sm text-body-sm text-on-surface-variant" id="materials-text">—</div>
            </div>
          </div>
          <div class="accordion-item border-b border-outline-variant/10 py-6">
            <button class="w-full flex justify-between items-center text-left" onclick="toggleAccordion(this)">
              <span class="font-label-caps text-on-surface tracking-widest">DIMENSIONS</span>
              <span class="material-symbols-outlined icon-rotate transition-transform text-primary">add</span>
            </button>
            <div class="accordion-content">
              <div class="pt-4 font-body-sm text-body-sm text-on-surface-variant" id="dimensions-text">—</div>
            </div>
          </div>
          <div class="accordion-item border-b border-outline-variant/10 py-6">
            <button class="w-full flex justify-between items-center text-left" onclick="toggleAccordion(this)">
              <span class="font-label-caps text-on-surface tracking-widest">SHIPPING &amp; RETURNS</span>
              <span class="material-symbols-outlined icon-rotate transition-transform text-primary">add</span>
            </button>
            <div class="accordion-content">
              <div class="pt-4 font-body-sm text-body-sm text-on-surface-variant" id="shipping-text">—</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Related products -->
    <section class="mt-section-gap">
      <div class="flex justify-between items-end mb-12">
        <div>
          <span class="font-label-caps text-on-surface-variant tracking-[0.3em]">COLLECTION</span>
          <h2 class="font-headline-lg text-headline-lg text-on-surface mt-2">YOU MAY ALSO LIKE</h2>
        </div>
        <a href="/shop.html" class="font-label-caps text-primary border-b border-primary pb-1">VIEW ALL</a>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-10" id="related-products"></div>
    </section>
  </div>
</main>

<!-- Footer -->
<footer class="bg-surface-container-lowest border-t border-outline-variant/10 py-20">
  <div class="max-w-container-max mx-auto px-edge-margin-desktop flex flex-col md:flex-row justify-between items-center gap-8">
    <span class="font-headline-lg text-primary uppercase tracking-widest">PAPERMONKS</span>
    <span class="font-label-caps text-on-surface-variant opacity-60">© 2024 PAPERMONKS. CRAFTED FOR THE METICULOUS.</span>
  </div>
</footer>

<script type="module">
  import { products, getProductById } from '/src/products.js'
  import { cart } from '/src/cart.js'

  const params = new URLSearchParams(window.location.search)
  const id = params.get('id')
  const product = getProductById(id)

  if (!product) {
    document.getElementById('loading').innerHTML = `
      <div class="text-center">
        <p class="font-label-caps text-on-surface-variant mb-6">PRODUCT NOT FOUND</p>
        <a href="/shop.html" class="font-label-caps text-primary border-b border-primary pb-1">BACK TO SHOP</a>
      </div>
    `
  } else {
    document.title = `${product.name} | PAPERMONKS`
    document.getElementById('loading').classList.add('hidden')
    document.getElementById('product-content').classList.remove('hidden')

    // Populate fields
    document.getElementById('product-name').textContent = product.name.toUpperCase()
    document.getElementById('product-edition').textContent = product.edition
    document.getElementById('product-price').textContent = `€${product.price}.00`
    document.getElementById('product-artist').textContent = `ARTIST: ${product.artist.toUpperCase()}`
    document.getElementById('product-description').textContent = product.description
    document.getElementById('materials-text').textContent = product.materials
    document.getElementById('dimensions-text').innerHTML = product.dimensions.replace(/\./g, '.<br/>')
    document.getElementById('shipping-text').textContent = product.shipping

    // Stock
    if (product.stock <= 3) {
      document.getElementById('stock-indicator').querySelector('div').classList.replace('bg-green-500', 'bg-yellow-500')
      document.getElementById('stock-text').textContent = `ONLY ${product.stock} LEFT`
    } else if (product.stock === 0) {
      document.getElementById('stock-indicator').querySelector('div').classList.replace('bg-green-500', 'bg-red-500')
      document.getElementById('stock-text').textContent = 'OUT OF STOCK'
    }

    // Main image
    const mainImg = document.getElementById('main-image')
    const mainImgSrc = product.image || product.images[0]
    mainImg.src = mainImgSrc
    mainImg.alt = product.name

    // Thumbnails
    const thumbContainer = document.getElementById('thumbnails')
    const dotNav = document.getElementById('dot-nav')
    const allImages = product.images && product.images.length > 0 ? product.images : [product.image]
    allImages.forEach((src, i) => {
      const btn = document.createElement('button')
      btn.className = 'aspect-square bg-surface-container overflow-hidden group'
      btn.innerHTML = `<img class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-all" src="${src}" alt="View ${i+1}"/>`
      btn.addEventListener('click', () => changeImage(i))
      thumbContainer.appendChild(btn)

      const dot = document.createElement('button')
      dot.className = 'w-2 h-2 rounded-full bg-white/50 hover:bg-white transition-colors'
      dot.addEventListener('click', () => changeImage(i))
      dotNav.appendChild(dot)
    })

    // Related products
    const related = products.filter(p => p.id !== product.id).sort(() => 0.5 - Math.random()).slice(0, 3)
    document.getElementById('related-products').innerHTML = related.map(p => `
      <a href="/product.html?id=${p.id}" class="group cursor-pointer block">
        <div class="relative aspect-[4/5] overflow-hidden bg-surface-container-low mb-6">
          <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" src="${p.image}" alt="${p.name}" loading="lazy" decoding="async"/>
          <div class="absolute inset-0 bg-ink-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
            <span class="font-label-caps text-white border border-white px-6 py-2 text-[11px]">VIEW DETAILS</span>
          </div>
        </div>
        <div class="flex justify-between items-start">
          <div>
            <h3 class="font-headline-lg text-on-surface group-hover:text-primary transition-colors text-xl">${p.name.toUpperCase()}</h3>
            <p class="font-label-caps text-on-surface-variant mt-1 text-[10px]">BY ${p.artist.toUpperCase()}</p>
          </div>
          <p class="text-primary">€${p.price}</p>
        </div>
      </a>
    `).join('')

    // Add to cart
    let currentQty = 1
    window.updateQty = (val) => {
      currentQty = Math.max(1, currentQty + val)
      document.getElementById('qty').textContent = currentQty
    }

    document.getElementById('add-to-cart-btn').addEventListener('click', () => {
      cart.addItem(product, currentQty)
    })

    window.changeImage = (index) => {
      mainImg.style.opacity = '0'
      setTimeout(() => {
        mainImg.src = allImages[index] || allImages[0]
        mainImg.style.opacity = '1'
      }, 300)
    }

    cart.updateBadges()
  }

  window.toggleAccordion = (btn) => {
    const item = btn.parentElement
    const isActive = item.classList.contains('active')
    document.querySelectorAll('.accordion-item').forEach(i => i.classList.remove('active'))
    if (!isActive) item.classList.add('active')
  }
</script>
<script type="module" src="/src/site.js"></script>
</body>
</html>
